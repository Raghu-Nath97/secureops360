name: Application Build & Deploy

on:
  push:
    branches: [main]
    paths: ['services/**']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy Services
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: [enricher, scorer]
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsSecureOps360
        aws-region: ap-south-1
    
    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2
    
    - name: Build, tag, and push image
      working-directory: services/${{ matrix.service }}-svc
      run: |
        docker build -t secureops360-dev-${{ matrix.service }} .
        docker tag secureops360-dev-${{ matrix.service }}:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/secureops360-dev-${{ matrix.service }}:latest
        docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.
